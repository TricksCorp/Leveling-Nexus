<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leveling Nexus — New Player</title>

<link rel="stylesheet" href="style.css">
<script type="module" src="z-registerFirebase.js"></script>
<script type="module" src="y-connectionError.js"></script>

</head>

<body class="new-player">

<div class="new-player-container">
    <!-- LIVE CLOCK -->
      <div class="header-clock">
        <div class="clock-time" id="clock-time">--<span class="clock-colon">:</span>-- --</div>
        <div class="clock-date" id="clock-date">--- --, ----</div>
      </div>

    <!-- Glow Icon -->
    <div class="icon-circle">
        <span>!</span>
    </div>

    <h2>NEW PLAYER REGISTRATION</h2>

    <!-- Username Input -->
    <div class="input-field">
        <input id="username" type="text" placeholder="Username" required>
    </div>

    <!-- Email Input -->
    <div class="input-field">
        <input id="email" type="email" placeholder="Email Address" required>
    </div>

    <!-- Password Input -->
    <div class="input-field">
        <input id="password" type="password" placeholder="Password" required>
    </div>

    <div class="button-row">
        <button id="submit" class="btn" type="submit" value="submit">Register</button>
        
        <div class="or-divider">OR</div>
        
        <button class="btn" onclick="goToLogin()">Go to Login</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
