<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leveling Nexus — Rank Evaluation</title>

<!-- =====================================================
     LEVELING NEXUS — PWA Meta Tags (add to ALL HTML pages)
     Place inside <head> of Login.html and every other page
     ===================================================== -->

<!-- Core PWA / Standalone mode -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEXUS">

<!-- Suppress browser chrome & loading bar -->
<meta name="theme-color" content="#000000">
<meta name="msapplication-navbutton-color" content="#000000">
<meta name="msapplication-starturl" content="/LEVELING-NEXUS/Login.html">

<!-- Splash screens (iOS — optional but prevents white flash) -->
<link rel="apple-touch-icon" href="/LEVELING-NEXUS/AppIcon.png">
<link rel="apple-touch-startup-image" href="/LEVELING-NEXUS/AppIcon.png">

<!-- Manifest -->
<link rel="manifest" href="/LEVELING-NEXUS/manifest.json">

<!-- =====================================================
     INLINE STYLE — also add this inside <style> or a
     linked CSS file to kill any residual white flash
     ===================================================== -->
<style>
  /* Prevent white flash on page load in standalone PWA */
  html, body {
    background-color: #000000 !important;
    margin: 0;
    padding: 0;
  }
</style>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script type="module" src="y-evaluation.js"></script>
</head>
<body class="evaluation">

  <div class="eval-bg"></div>
  <div class="eval-overlay"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="eval-container">

    <!-- Header -->
    <div class="eval-header">
      <div class="eval-logo">LEVELING NEXUS</div>
      <div class="eval-subtitle">RANK EVALUATION SYSTEM</div>
    </div>

    <!-- Phase indicator -->
    <div class="eval-phases" id="eval-phases">
      <div class="phase-dot active" data-phase="0">
        <span>HABITS</span>
      </div>
      <div class="phase-line"></div>
      <div class="phase-dot" data-phase="1">
        <span>PHYSICAL</span>
      </div>
      <div class="phase-line"></div>
      <div class="phase-dot" data-phase="2">
        <span>INTELLIGENCE</span>
      </div>
    </div>

    <!-- Main card -->
    <div class="eval-card" id="eval-card">

      <!-- Timer bar -->
      <div class="eval-timer-wrap" id="eval-timer-wrap" style="display:none;">
        <div class="eval-timer-bar" id="eval-timer-bar"></div>
        <div class="eval-timer-label" id="eval-timer-label">10s</div>
      </div>

      <!-- Content area -->
      <div id="eval-content">
        <!-- Populated by y-evaluation.js -->
      </div>

    </div>

    <!-- Progress -->
    <div class="eval-progress" id="eval-progress"></div>

  </div>

  <style>
    :root {
      --bg:     #061018;
      --neon:   #41b6ff;
      --neon-2: #00e0ff;
      --muted:  #9fb6d1;
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body.evaluation {
      min-height: 100vh;
      background: var(--bg);
      font-family: "Orbitron", system-ui;
      color: #d9eefc;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .eval-bg {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(65,182,255,0.06), transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,224,255,0.04), transparent),
        var(--bg);
      z-index: 0;
    }
    .eval-overlay {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
      );
      z-index: 1; pointer-events: none;
    }

    .corner {
      position: fixed; width: 36px; height: 36px; z-index: 10; opacity: 0.3;
    }
    .corner-tl { top:16px; left:16px; border-top:2px solid var(--neon); border-left:2px solid var(--neon); }
    .corner-tr { top:16px; right:16px; border-top:2px solid var(--neon); border-right:2px solid var(--neon); }
    .corner-bl { bottom:16px; left:16px; border-bottom:2px solid var(--neon); border-left:2px solid var(--neon); }
    .corner-br { bottom:16px; right:16px; border-bottom:2px solid var(--neon); border-right:2px solid var(--neon); }

    .eval-container {
      position: relative; z-index: 10;
      width: 100%; max-width: 620px;
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
    }

    /* Header */
    .eval-header { text-align: center; }
    .eval-logo {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 900; letter-spacing: 4px;
      color: var(--neon);
      text-shadow: 0 0 20px rgba(65,182,255,0.5);
    }
    .eval-subtitle {
      font-size: 10px; letter-spacing: 3px;
      color: rgba(65,182,255,0.4);
      margin-top: 4px;
    }

    /* Phase indicator */
    .eval-phases {
      display: flex; align-items: center; gap: 0;
      width: 100%;
    }
    .phase-dot {
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .phase-dot::before {
      content: "";
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(65,182,255,0.25);
      background: transparent;
      transition: all 0.3s ease;
    }
    .phase-dot.active::before {
      border-color: var(--neon);
      background: var(--neon);
      box-shadow: 0 0 10px rgba(65,182,255,0.6);
    }
    .phase-dot.done::before {
      border-color: rgba(65,182,255,0.5);
      background: rgba(65,182,255,0.2);
    }
    .phase-dot span {
      font-size: 8px; letter-spacing: 1px;
      color: rgba(65,182,255,0.35);
      transition: color 0.3s;
    }
    .phase-dot.active span { color: var(--neon); }
    .phase-dot.done span { color: rgba(65,182,255,0.5); }
    .phase-line {
      flex: 1; height: 1px;
      background: rgba(65,182,255,0.15);
      margin-bottom: 18px;
    }

    /* Main card */
    .eval-card {
      width: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.02));
      border-radius: var(--radius);
      border: 1px solid rgba(65,182,255,0.18);
      box-shadow: 0 0 40px rgba(65,182,255,0.08), 0 10px 40px rgba(0,0,0,0.6);
      padding: 28px 28px 24px;
      min-height: 320px;
    }

    /* Timer */
    .eval-timer-wrap {
      width: 100%; height: 6px;
      background: rgba(65,182,255,0.08);
      border-radius: 6px; overflow: hidden;
      margin-bottom: 20px;
      position: relative;
    }
    .eval-timer-bar {
      height: 100%; width: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--neon), var(--neon-2));
      box-shadow: 0 0 8px rgba(65,182,255,0.5);
      transition: width linear, background 0.5s;
    }
    .eval-timer-bar.warning {
      background: linear-gradient(90deg, #ffb800, #ff8c00);
      box-shadow: 0 0 8px rgba(255,180,0,0.5);
    }
    .eval-timer-bar.critical {
      background: linear-gradient(90deg, #ff6b6b, #ff3333);
      box-shadow: 0 0 8px rgba(255,80,80,0.5);
    }
    .eval-timer-label {
      position: absolute; right: 0; top: 8px;
      font-size: 8px; color: rgba(65,182,255,0.4);
      letter-spacing: 0.5px;
    }

    /* Question */
    .eval-question-num {
      font-size: 9px; letter-spacing: 2px;
      color: rgba(65,182,255,0.4);
      margin-bottom: 10px;
    }
    .eval-question-text {
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 700; letter-spacing: 0.5px;
      color: #d9eefc; line-height: 1.5;
      margin-bottom: 24px;
    }

    /* Choices */
    .eval-choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .eval-choice {
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(65,182,255,0.15);
      background: rgba(65,182,255,0.03);
      font-family: "Orbitron", system-ui;
      font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
      color: rgba(65,182,255,0.7);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left; line-height: 1.4;
    }
    .eval-choice:hover {
      border-color: rgba(65,182,255,0.45);
      background: rgba(65,182,255,0.08);
      color: #d9eefc;
      transform: translateY(-1px);
    }
    .eval-choice.selected {
      border-color: var(--neon);
      background: rgba(65,182,255,0.12);
      color: var(--neon);
      box-shadow: 0 0 10px rgba(65,182,255,0.2);
    }
    .eval-choice.correct {
      border-color: #41ff88;
      background: rgba(65,255,130,0.1);
      color: #41ff88;
    }
    .eval-choice.wrong {
      border-color: #ff6b6b;
      background: rgba(255,80,80,0.08);
      color: #ff6b6b;
    }
    .eval-choice.reveal {
      border-color: #41ff88;
      background: rgba(65,255,130,0.08);
      color: #41ff88;
    }
    .eval-choice:disabled { cursor: not-allowed; }

    /* Input fields (physical phase) */
    .eval-input-group {
      display: flex; flex-direction: column; gap: 14px;
      margin-bottom: 24px;
    }
    .eval-input-label {
      font-size: 9px; letter-spacing: 1.5px;
      color: rgba(65,182,255,0.4);
      margin-bottom: 4px;
    }
    .eval-input {
      width: 100%; padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(65,182,255,0.2);
      background: rgba(65,182,255,0.04);
      color: #d9eefc;
      font-family: "Orbitron", system-ui;
      font-size: 13px; font-weight: 700;
      outline: none;
      transition: border-color 0.2s;
    }
    .eval-input:focus { border-color: rgba(65,182,255,0.5); }
    .eval-input::placeholder { color: rgba(65,182,255,0.2); font-weight: 400; }

    /* Next / Submit button */
    .eval-next-btn {
      margin-top: 20px; width: 100%;
      padding: 13px;
      font-family: "Orbitron", system-ui;
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      color: #021726;
      background: linear-gradient(180deg, var(--neon), var(--neon-2));
      border: none; border-radius: 10px; cursor: pointer;
      box-shadow: 0 0 16px rgba(65,182,255,0.4);
      transition: all 0.2s ease;
    }
    .eval-next-btn:hover { transform: translateY(-1px); box-shadow: 0 0 24px rgba(65,182,255,0.6); }
    .eval-next-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* Phase intro */
    .eval-phase-intro {
      display: flex; flex-direction: column;
      align-items: center; text-align: center; gap: 14px;
      padding: 10px 0;
    }
    .eval-phase-icon { font-size: 44px; }
    .eval-phase-title {
      font-size: clamp(16px, 3vw, 22px);
      font-weight: 900; letter-spacing: 2px;
      color: var(--neon);
      text-shadow: 0 0 16px rgba(65,182,255,0.4);
    }
    .eval-phase-desc {
      font-size: 11px; letter-spacing: 0.5px;
      color: rgba(159,182,209,0.6);
      line-height: 1.7; max-width: 420px;
    }
    .eval-phase-warn {
      font-size: 9px; letter-spacing: 0.5px;
      color: rgba(255,180,0,0.6);
      padding: 8px 14px; border-radius: 8px;
      border: 1px solid rgba(255,180,0,0.2);
      background: rgba(255,180,0,0.05);
    }

    /* Results */
    .eval-results {
      display: flex; flex-direction: column;
      align-items: center; gap: 18px;
      text-align: center;
    }
    .eval-results-title {
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 900; letter-spacing: 3px;
      color: var(--neon);
      text-shadow: 0 0 20px rgba(65,182,255,0.5);
    }
    .eval-results-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; width: 100%;
    }
    .eval-result-card {
      padding: 14px 10px;
      border-radius: 10px;
      border: 1px solid rgba(65,182,255,0.15);
      background: rgba(65,182,255,0.04);
      display: flex; flex-direction: column; gap: 6px;
    }
    .eval-result-label {
      font-size: 8px; letter-spacing: 1.5px;
      color: rgba(65,182,255,0.4);
    }
    .eval-result-value {
      font-size: 28px; font-weight: 900;
      color: #d9eefc;
    }
    .eval-result-card.highlight {
      border-color: rgba(65,182,255,0.35);
      background: rgba(65,182,255,0.08);
    }
    .eval-result-card.highlight .eval-result-value {
      color: var(--neon);
      text-shadow: 0 0 12px rgba(65,182,255,0.4);
    }
    .eval-rank-badge {
      padding: 6px 20px; border-radius: 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      background: rgba(65,182,255,0.1);
      border: 1px solid rgba(65,182,255,0.3);
      color: var(--neon);
    }

    /* Progress text */
    .eval-progress {
      font-size: 9px; letter-spacing: 1.5px;
      color: rgba(65,182,255,0.3);
      text-align: center;
    }

    /* Error */
    .eval-error {
      font-size: 10px; color: #ff6b6b;
      letter-spacing: 0.3px; margin-top: 6px;
      min-height: 16px;
    }

    @media (max-width: 500px) {
      .eval-card { padding: 20px 16px; }
      .eval-choices { grid-template-columns: 1fr; }
      .eval-results-grid { grid-template-columns: 1fr; }
    }
  </style>

</body>
</html>
