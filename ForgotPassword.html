<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leveling Nexus — Forgot Password</title>
  
  <link rel="manifest" href="/LEVELING-NEXUS/manifest.json" />
<meta name="theme-color" content="#000000" />

  
<!-- =====================================================
     LEVELING NEXUS — PWA Meta Tags (add to ALL HTML pages)
     Place inside <head> of Login.html and every other page
     ===================================================== -->

<!-- Core PWA / Standalone mode -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEXUS">

<!-- Suppress browser chrome & loading bar -->
<meta name="theme-color" content="#000000">
<meta name="msapplication-navbutton-color" content="#000000">
<meta name="msapplication-starturl" content="/LEVELING-NEXUS/Login.html">

<!-- Splash screens (iOS — optional but prevents white flash) -->
<link rel="apple-touch-icon" href="/LEVELING-NEXUS/AppIcon.png">
<link rel="apple-touch-startup-image" href="/LEVELING-NEXUS/AppIcon.png">

<!-- Manifest -->
<link rel="manifest" href="/LEVELING-NEXUS/manifest.json">

<!-- =====================================================
     INLINE STYLE — also add this inside <style> or a
     linked CSS file to kill any residual white flash
     ===================================================== -->
<style>
  /* Prevent white flash on page load in standalone PWA */
  html, body {
    background-color: #000000 !important;
    margin: 0;
    padding: 0;
  }
</style>
  
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <script type="module" src="y-forgotPassword.js"></script>
</head>

<body class="login">
  <div class="login-container">

    <div class="icon-circle">
      <span>🔑</span>
    </div>

    <h2>RESET PASSWORD</h2>
    <p style="font-size:11px;color:#7ac8ff;margin-bottom:10px;letter-spacing:0.5px;">
      Enter your email and we'll send you a reset link.
    </p>

    <div class="input-field">
      <input type="email" id="reset-email" placeholder="Email Address" />
    </div>

    <div class="button-row">
      <button class="btn" id="reset-submit">SEND RESET LINK</button>
    </div>

    <div style="margin-top:16px;">
      <a href="Login.html"
         style="font-family:'Orbitron',system-ui;font-size:10px;
                color:rgba(65,182,255,0.5);letter-spacing:0.5px;
                text-decoration:none;">
         ◀ Back to Login
      </a>
    </div>

  </div>
</body>
</html>
