<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leveling Nexus — Forgot Password</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <script type="module" src="y-forgotPassword.js"></script>
</head>

<body class="login">
  <div class="login-container">

    <div class="icon-circle">
      <span>🔑</span>
    </div>

    <h2>RESET PASSWORD</h2>
    <p style="font-size:11px;color:#7ac8ff;margin-bottom:10px;letter-spacing:0.5px;">
      Enter your email and we'll send you a reset link.
    </p>

    <div class="input-field">
      <input type="email" id="reset-email" placeholder="Email Address" />
    </div>

    <div class="button-row">
      <button class="btn" id="reset-submit">SEND RESET LINK</button>
    </div>

    <div style="margin-top:16px;">
      <a href="Login.html"
         style="font-family:'Orbitron',system-ui;font-size:10px;
                color:rgba(65,182,255,0.5);letter-spacing:0.5px;
                text-decoration:none;">
         ◀ Back to Login
      </a>
    </div>

  </div>
</body>
</html>
